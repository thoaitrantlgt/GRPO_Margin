base_config: ../train/paper_boundary_seed42.yaml
generated_dir: generated/ablations
accelerate_config: configs/accelerate/single_gpu.yaml
seeds: [42]
variants:
  - name: gate_only
    overrides:
      margin:
        enabled: true
        use_group_gate: true
        use_boundary_proximity: false
  - name: boundary_only
    overrides:
      margin:
        enabled: true
        use_group_gate: false
        use_boundary_proximity: true
  - name: no_format_reward
    overrides:
      rewards:
        weights: [1.0, 0.0]
  - name: top1_top2
    overrides:
      margin:
        gate_type: top1_top2
  - name: no_advantage_clip
    overrides:
      margin:
        advantage_clip: null

